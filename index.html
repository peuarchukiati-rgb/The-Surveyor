<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="theme-color" content="#1a1a1a">
<title>The Surveyor — ตรวจศาลาที่พักผู้โดยสาร</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Sukhumvit Set", system-ui, sans-serif;
  background: #f5f7fa; color: #1a1a1a; -webkit-font-smoothing: antialiased;
}
.tor-bar {
  position: sticky; top: 0; z-index: 20;
  background: #1d1d1f; padding: 10px 12px;
  display: flex; gap: 6px; overflow-x: auto;
  box-shadow: 0 2px 8px rgba(0,0,0,.12);
}
.tor-btn {
  background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
  color: #fff; padding: 7px 14px; border-radius: 8px; cursor: pointer;
  white-space: nowrap; font-size: 13px; transition: all .15s;
}
.tor-btn:hover { background: rgba(255,255,255,.18); }
.tor-btn.active { background: #1a73e8; border-color: #1a73e8; font-weight: 600; }
.tor-btn .cnt { background: rgba(255,255,255,.2); padding: 1px 6px; border-radius: 10px; font-size: 11px; margin-left: 4px; }
header {
  background: #fff; border-bottom: 1px solid #e1e5eb; padding: 14px 16px;
}
header h1 { margin: 0 0 4px; font-size: 18px; font-weight: 600; }
header .sub { color: #5f6368; font-size: 13px; display: flex; gap: 12px; flex-wrap: wrap; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 600; }
.badge.day { background: #fbbc04; color: #3c2a00; }
.badge.night { background: #34374b; color: #fff; }
.stats {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 6px; margin-top: 10px;
}
.stat { background: #f5f7fa; padding: 8px 10px; border-radius: 8px; font-size: 12px; }
.stat .n { font-size: 18px; font-weight: 600; display: block; }
.stat .l { color: #5f6368; font-size: 11px; }
.controls {
  padding: 8px 12px; background: #fff; border-bottom: 1px solid #e1e5eb;
  display: flex; gap: 6px;
}
.controls input {
  flex: 1; padding: 9px 11px; font-size: 14px;
  border: 1px solid #d0d7e0; border-radius: 8px; background: #fff;
}
.controls input:focus { outline: none; border-color: #1a73e8; }
.district-list { padding: 8px 8px 80px; }
.district {
  background: #fff; border-radius: 12px; margin: 6px 0;
  overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.04);
  border: 1px solid #e1e5eb;
}
.district-hdr {
  padding: 12px 16px; cursor: pointer; display: flex;
  justify-content: space-between; align-items: center; user-select: none;
}
.district-hdr:active { background: #f9f9fb; }
.district-name { font-weight: 600; font-size: 15px; }
.district-cnt { font-size: 12px; color: #5f6368; }
.district-body { display: none; border-top: 1px solid #f0f0f2; }
.district.open .district-body { display: block; }
.stop {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; border-bottom: 1px solid #f0f0f2; cursor: pointer;
}
.stop:last-child { border-bottom: none; }
.stop:active { background: #f5f7fa; }
.stop-info { flex: 1; min-width: 0; }
.stop-code { font-weight: 600; font-size: 14px; }
.stop-loc { font-size: 12px; color: #5f6368; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.stop-status { font-size: 11px; padding: 3px 8px; border-radius: 10px; white-space: nowrap; }
.s-todo { background: #fbbc04; color: #3c2a00; }
.s-day { background: #4285f4; color: #fff; }
.s-night { background: #80868b; color: #fff; }
.s-photo { background: #ea8600; color: #fff; }
.s-done { background: #34a853; color: #fff; }
.stop-arrow { color: #b0b4ba; font-size: 20px; }
.empty { text-align: center; padding: 40px 20px; color: #5f6368; font-size: 14px; }
.loading { text-align: center; padding: 40px 20px; color: #5f6368; }
.panel-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 50;
  opacity: 0; transition: opacity .2s; pointer-events: none;
}
.panel-overlay.open { opacity: 1; pointer-events: auto; }
.panel {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 51;
  background: #fff; border-radius: 16px 16px 0 0; padding: 20px 16px 28px;
  box-shadow: 0 -4px 20px rgba(0,0,0,.15);
  transform: translateY(100%); transition: transform .25s ease-out;
  max-height: 80vh; overflow-y: auto;
}
.panel-overlay.open .panel { transform: translateY(0); }
.panel-handle { width: 36px; height: 4px; background: #d0d7e0; border-radius: 2px; margin: 0 auto 14px; }
.panel-code { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.panel-loc { font-size: 13px; color: #5f6368; margin-bottom: 14px; line-height: 1.4; }
.panel-actions { display: flex; flex-direction: column; gap: 8px; }
.panel-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; border-radius: 10px; border: 1px solid #e1e5eb;
  background: #fff; font-size: 14px; cursor: pointer; text-decoration: none; color: #1a1a1a;
  transition: background .1s;
}
.panel-btn:active { background: #f5f7fa; }
.panel-btn.disabled { opacity: .4; pointer-events: none; }
.panel-btn .icon { font-size: 18px; width: 24px; text-align: center; }
.panel-footer { margin-top: 14px; text-align: center; }
</style>
</head>
<body>

<div class="tor-bar" id="torBar"></div>
<header id="header"></header>
<div class="controls">
  <input id="search" type="search" placeholder="🔍 ค้น code, ถนน, location..." autocomplete="off">
</div>
<div class="district-list" id="districtList"><div class="loading">กำลังโหลด...</div></div>
<div class="panel-overlay" id="panelOverlay" onclick="closePanel()">
  <div class="panel" onclick="event.stopPropagation()" id="panel"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG — verified form URLs (2026-05-14)
// ═══════════════════════════════════════════════════════
const TORS = [
  {
    id: "ES", name: "กรุงเทพตะวันออก", short: "ตะวันออก", prefix: "ES",
    count: 606, owner: "SO!", status: "live",
    stops_url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSAcbD5e-Y2XfosEch6SBzJBpT5gTmrQ9wt9Ir1RCndSAYypUOH_etUIahPu-QbIWbL3FinZfzPHf9C/pub?gid=0&single=true&output=csv",
    day_url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRW5Nsl7kTq1Lg0agwRoUrfMWMyFCIcnWf6G34KRV6iS9CbzpCLzXHT1EWgjNqBEleHw6ikNbSD_waf/pub?gid=33934151&single=true&output=csv",
    night_url: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRW5Nsl7kTq1Lg0agwRoUrfMWMyFCIcnWf6G34KRV6iS9CbzpCLzXHT1EWgjNqBEleHw6ikNbSD_waf/pub?gid=2108996858&single=true&output=csv",
    form_day: "https://docs.google.com/forms/d/e/1FAIpQLSdAY_LzugWtJTkBLbPqb6aakmPMSTR8OKX58sIEQyYBoVncZw/viewform?usp=pp_url&entry.634995506={CODE}",
    form_night: "https://docs.google.com/forms/d/e/1FAIpQLSfbGm9X6qM9fVt8EUl5F5TLaIpoLjgM2Aj0sTiSvHKg2uXPTQ/viewform?usp=pp_url&entry.1138688633={CODE}"
  },
  {
    id: "TNS", name: "กรุงธนเหนือ-ใต้", short: "กรุงธน", prefix: "TNS",
    count: 272, owner: "Look Ads", status: "live",
    stops_url: "https://docs.google.com/spreadsheets/d/1JiUp6HxBkO5P75txGmiFbtxb0SB3wkc57UHpnL1JfdA/export?format=csv&gid=1057962464",
    day_url: "https://docs.google.com/spreadsheets/d/1JiUp6HxBkO5P75txGmiFbtxb0SB3wkc57UHpnL1JfdA/export?format=csv&gid=116756779",
    night_url: "https://docs.google.com/spreadsheets/d/1JiUp6HxBkO5P75txGmiFbtxb0SB3wkc57UHpnL1JfdA/export?format=csv&gid=331680235",
    form_day: "https://docs.google.com/forms/d/e/1FAIpQLSctu7CfQhXb5RAP-V6BXazyPDL-IvEbJeNzoFyn5C8Uvr9B5Q/viewform?usp=pp_url&entry.634995506={CODE}",
    form_night: "https://docs.google.com/forms/d/e/1FAIpQLSeisQbUSC7f8yV4fbucbDNHZh5nbjL5ZUjx6TAiO-5VFatneQ/viewform?usp=pp_url&entry.1138688633={CODE}"
  },
  {
    id: "SS", name: "กรุงเทพใต้", short: "ใต้", prefix: "SS",
    count: 233, owner: "Look Ads", status: "live",
    stops_url: "https://docs.google.com/spreadsheets/d/1YJaVIX9gJDXkRcoVrGwZGQfs3nlxKSmmrIJv6kTTlRk/export?format=csv&gid=1437038297",
    day_url: "https://docs.google.com/spreadsheets/d/1YJaVIX9gJDXkRcoVrGwZGQfs3nlxKSmmrIJv6kTTlRk/export?format=csv&gid=1603041302",
    night_url: "https://docs.google.com/spreadsheets/d/1YJaVIX9gJDXkRcoVrGwZGQfs3nlxKSmmrIJv6kTTlRk/export?format=csv&gid=386227147",
    form_day: "https://docs.google.com/forms/d/e/1FAIpQLSfItSPlSk-MitQzX8GqbGVZxdKIy0NPTZBjyFmnkqkB58W2Gw/viewform?usp=pp_url&entry.634995506={CODE}",
    form_night: "https://docs.google.com/forms/d/e/1FAIpQLSdCtsEXTGNauHMnh2ZiGXVbbb3CH9XBVwSKVWleVv_DhpIH8Q/viewform?usp=pp_url&entry.1138688633={CODE}"
  },
  {
    id: "NS", name: "กรุงเทพเหนือ", short: "เหนือ", prefix: "NS",
    count: 246, owner: "Look Ads", status: "live",
    stops_url: "https://docs.google.com/spreadsheets/d/1QuiJkP9kvYvRGzSoOzXd4EJOeQEChZ4fzJCITcj9_RU/export?format=csv&gid=1808728461",
    day_url: "https://docs.google.com/spreadsheets/d/1QuiJkP9kvYvRGzSoOzXd4EJOeQEChZ4fzJCITcj9_RU/export?format=csv&gid=388228796",
    night_url: "https://docs.google.com/spreadsheets/d/1QuiJkP9kvYvRGzSoOzXd4EJOeQEChZ4fzJCITcj9_RU/export?format=csv&gid=225515044",
    form_day: "https://docs.google.com/forms/d/e/1FAIpQLSdaohB0LbTHO-nfo_4uf7hW_rqrGSXXJfgmD1-WzKbNXThD0g/viewform?usp=pp_url&entry.634995506={CODE}",
    form_night: "https://docs.google.com/forms/d/e/1FAIpQLSe0FTSht1MHKFhQflclgvTnmnw0PZnvKxzlfNRrS1Wv5afXwg/viewform?usp=pp_url&entry.1138688633={CODE}"
  },
  {
    id: "MS", name: "กรุงเทพกลาง", short: "กลาง", prefix: "MS",
    count: 259, owner: "Look Ads", status: "live",
    stops_url: "https://docs.google.com/spreadsheets/d/1m3BtEkaFOaqqXgFTgQbKx-XiOlt6qgigJVLLZb5QGN4/export?format=csv&gid=204657089",
    day_url: "https://docs.google.com/spreadsheets/d/1RNppV8F5we57NtOj5qtVOVVHzZzX2uMNpa6sByPHnGE/export?format=csv&gid=305421805",
    night_url: "https://docs.google.com/spreadsheets/d/1RNppV8F5we57NtOj5qtVOVVHzZzX2uMNpa6sByPHnGE/export?format=csv&gid=1418740145",
    form_day: "https://docs.google.com/forms/d/1sBOi8hMnThl5AphyY716Bo635QPBwd6mnBaa6yMl2c4/viewform?usp=pp_url&entry.634995506={CODE}",
    form_night: "https://docs.google.com/forms/d/1ShUjZtnsgxoGI4X2A7CBb3UqpvXTXbAYxeyGleyLuAg/viewform?usp=pp_url&entry.1138688633={CODE}"
  }
];

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let curTorId = localStorage.getItem("lastTOR") || "ES";
let stops = [], dayResp = [], nightResp = [];
let searchTerm = "";

function curTor() { return TORS.find(t => t.id === curTorId) || TORS[0]; }
function isDaytime() { const h = new Date().getHours(); return h >= 6 && h < 18; }

// ═══════════════════════════════════════════════════════
// CSV
// ═══════════════════════════════════════════════════════
async function fetchCSV(url) {
  try {
    const r = await fetch(url, { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    return parseCSV(await r.text());
  } catch (e) { console.error("CSV fetch:", e); return []; }
}

function parseCSV(text) {
  const lines = text.replace(/\r/g, "").split("\n").filter(l => l.length);
  if (!lines.length) return [];
  const hdrs = parseLine(lines[0]);
  return lines.slice(1).map(l => {
    const vals = parseLine(l);
    return Object.fromEntries(hdrs.map((h, i) => [h.trim(), (vals[i] || "").trim()]));
  });
}

function parseLine(line) {
  const out = []; let cur = "", inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') inQ = !inQ;
    else if (c === ',' && !inQ) { out.push(cur); cur = ""; }
    else cur += c;
  }
  out.push(cur);
  return out;
}

// ═══════════════════════════════════════════════════════
// STATUS (matches Bangkok East logic)
// ═══════════════════════════════════════════════════════
function getPhotoConfirmKey(headers) {
  let k = headers.find(h => h.includes("ยืนยัน") && (h.includes("11 รูป") || h.includes("คู่มือถ่ายภาพ")));
  if (k) return k;
  k = headers.find(h => h.includes("อัพรูป") && h.includes("ครบ"));
  if (k) return k;
  return headers.find(h => h.includes("ยืนยัน") && h.includes("อัพรูป"));
}

function isPhotoConfirmed(row, headers) {
  const k = getPhotoConfirmKey(headers);
  if (!k) return false;
  const v = (row[k] || "").toLowerCase().trim();
  return v.includes("ครบ") || v.includes("ยืนยัน") || v === "yes" || v === "true";
}

function calcStatus(code) {
  const dayOK = dayResp.some(r => (r["รหัสป้าย"] || "").trim() === code);
  const nightOK = nightResp.some(r => (r["รหัสป้าย"] || "").trim() === code);
  const all = [...dayResp, ...nightResp].filter(r => (r["รหัสป้าย"] || "").trim() === code);
  const headers = all.length ? Object.keys(all[0]) : [];
  const photo = all.some(r => isPhotoConfirmed(r, headers));
  if (dayOK && nightOK && photo) return "done";
  if (dayOK && nightOK) return "photo";
  if (dayOK) return "day";
  if (nightOK) return "night";
  return "todo";
}

const STATUS_LBL = { todo:"ยังไม่ตรวจ", day:"กลางวันเสร็จ", night:"กลางคืนเสร็จ", photo:"ขาดรูป", done:"เสร็จ ✓" };
const STATUS_CLS = { todo:"s-todo", day:"s-day", night:"s-night", photo:"s-photo", done:"s-done" };

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function renderTorBar() {
  document.getElementById("torBar").innerHTML = TORS.map(t =>
    `<button class="tor-btn ${t.id===curTorId?'active':''}" onclick="switchTor('${t.id}')">
      🟢 ${t.short}<span class="cnt">${t.count}</span>
    </button>`
  ).join("");
}

function renderHeader() {
  const t = curTor();
  const total = stops.length;
  const statuses = stops.map(s => calcStatus(s.code));
  const done = statuses.filter(s => s === "done").length;
  const pct = total ? Math.round(done / total * 100) : 0;
  const modeClass = isDaytime() ? "day" : "night";
  const modeLabel = isDaytime() ? "☀️ กลางวัน" : "🌙 กลางคืน";

  document.getElementById("header").innerHTML = `
    <h1>${t.name}</h1>
    <div class="sub">
      <span>${t.prefix}001–${t.prefix}${String(t.count).padStart(3,'0')} · ${t.owner}</span>
      <span class="badge ${modeClass}">${modeLabel}</span>
    </div>
    <div class="stats">
      <div class="stat"><span class="n">${total}</span><span class="l">ทั้งหมด</span></div>
      <div class="stat"><span class="n">${done}</span><span class="l">เสร็จแล้ว</span></div>
      <div class="stat"><span class="n">${total - done}</span><span class="l">ค้าง</span></div>
      <div class="stat"><span class="n">${pct}%</span><span class="l">Done</span></div>
    </div>
  `;
}

function renderDistricts() {
  const q = searchTerm.toLowerCase();
  const filtered = q ? stops.filter(s =>
    [s.code, s.district, s.road, s.location].some(v => v && v.toLowerCase().includes(q))
  ) : stops;

  if (!filtered.length) {
    document.getElementById("districtList").innerHTML = `<div class="empty">${q ? 'ไม่พบผลลัพธ์' : 'ไม่มีข้อมูล'}</div>`;
    return;
  }

  const byDist = {};
  filtered.forEach(s => {
    const d = s.district || "(ไม่ระบุ)";
    if (!byDist[d]) byDist[d] = [];
    byDist[d].push(s);
  });

  document.getElementById("districtList").innerHTML = Object.entries(byDist).map(([dist, arr]) => {
    const done = arr.filter(s => calcStatus(s.code) === "done").length;
    return `
      <div class="district">
        <div class="district-hdr" onclick="this.parentElement.classList.toggle('open')">
          <span class="district-name">${dist}</span>
          <span class="district-cnt">${done}/${arr.length}</span>
        </div>
        <div class="district-body">
          ${arr.map(s => renderStop(s)).join("")}
        </div>
      </div>`;
  }).join("");
}

function renderStop(s) {
  const st = calcStatus(s.code);
  return `
    <div class="stop" onclick="showStopPanel('${s.code.replace(/'/g,"&#39;")}')">
      <div class="stop-info">
        <div class="stop-code">${s.code}</div>
        <div class="stop-loc">${s.district || ""} · ${s.road || ""} · ${s.location || ""}</div>
      </div>
      <span class="stop-status ${STATUS_CLS[st]}">${STATUS_LBL[st]}</span>
      <span class="stop-arrow">›</span>
    </div>`;
}

function showStopPanel(code) {
  const s = stops.find(x => x.code === code);
  if (!s) return;
  const t = curTor();
  const st = calcStatus(code);
  const dayUrl = t.form_day.includes("{CODE}") ? t.form_day.replace("{CODE}", encodeURIComponent(code)) : t.form_day;
  const nightUrl = t.form_night.includes("{CODE}") ? t.form_night.replace("{CODE}", encodeURIComponent(code)) : t.form_night;
  const hasMap = s.lat && s.long;
  const mapUrl = hasMap ? `https://maps.google.com/?q=${s.lat},${s.long}` : "";
  const hasFolder = s.folder_url && s.folder_url.trim();

  document.getElementById("panel").innerHTML = `
    <div class="panel-handle"></div>
    <div class="panel-code">${s.code}</div>
    <div class="panel-loc">${s.district || ""} · ${s.road || ""}<br>${s.location || ""}</div>
    <div class="panel-actions">
      <a class="panel-btn ${hasMap ? '' : 'disabled'}" href="${mapUrl}" target="_blank" rel="noopener">
        <span class="icon">📍</span> เปิดแผนที่
      </a>
      <a class="panel-btn ${hasFolder ? '' : 'disabled'}" href="${hasFolder || '#'}" target="_blank" rel="noopener">
        <span class="icon">📁</span> ${hasFolder ? 'เปิด Drive folder' : 'ยังไม่มี folder'}
      </a>
      <a class="panel-btn" href="${dayUrl}" target="_blank" rel="noopener">
        <span class="icon">☀️</span> กลางวัน
      </a>
      <a class="panel-btn" href="${nightUrl}" target="_blank" rel="noopener">
        <span class="icon">🌙</span> กลางคืน
      </a>
    </div>
    <div class="panel-footer">
      <span class="stop-status ${STATUS_CLS[st]}">${STATUS_LBL[st]}</span>
    </div>`;
  document.getElementById("panelOverlay").classList.add("open");
}

function closePanel() {
  document.getElementById("panelOverlay").classList.remove("open");
}

// ═══════════════════════════════════════════════════════
// LOAD
// ═══════════════════════════════════════════════════════
async function switchTor(id) {
  curTorId = id;
  localStorage.setItem("lastTOR", id);
  await loadTor();
}

async function loadTor() {
  const t = curTor();
  renderTorBar();
  document.getElementById("districtList").innerHTML = '<div class="loading">กำลังโหลด...</div>';

  const [s, d, n] = await Promise.all([
    fetchCSV(t.stops_url),
    t.day_url ? fetchCSV(t.day_url) : [],
    t.night_url ? fetchCSV(t.night_url) : []
  ]);
  stops = s; dayResp = d; nightResp = n;

  renderHeader();
  renderDistricts();
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
document.getElementById("search").addEventListener("input", e => {
  searchTerm = e.target.value.trim();
  renderDistricts();
});
setInterval(() => renderHeader(), 60000); // update day/night badge
loadTor();
</script>
</body>
</html>
