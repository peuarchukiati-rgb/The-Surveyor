<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="theme-color" content="#0f1117">
<title>The Surveyor v2 — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  margin: 0; font-family: 'Sarabun', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: #f5f7fa; color: #1a1a1a; -webkit-font-smoothing: antialiased;
  font-size: 15px; line-height: 1.5;
}

/* Header */
.header {
  position: sticky; top: 0; z-index: 20;
  background: #fff; border-bottom: 1px solid #e1e5eb;
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.header h1 { margin: 0; font-size: 17px; font-weight: 700; color: #1a1a1a; }
.header .sub { font-size: 12px; color: #5f6368; }
.badge-dummy {
  display: inline-block; background: #fce8e6; color: #c5221f;
  padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 700;
}

/* Summary */
.summary {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 8px; padding: 12px 16px; background: #fff; border-bottom: 1px solid #e1e5eb;
}
.sum-card {
  background: #f5f7fa; border-radius: 10px; padding: 10px 12px; text-align: center;
  border: 1px solid #e8eaed;
}
.sum-card .n { font-size: 22px; font-weight: 700; color: #1a73e8; display: block; }
.sum-card .l { font-size: 11px; color: #5f6368; }
.sum-card .d { font-size: 10px; color: #9aa0a6; }

/* Filters */
.filters {
  position: sticky; top: 53px; z-index: 19;
  padding: 8px 16px; display: flex; gap: 8px; flex-wrap: wrap;
  background: #fff; border-bottom: 1px solid #e1e5eb;
}
.filters select, .filters input {
  background: #fff; color: #1a1a1a; border: 1px solid #d0d7e0; border-radius: 8px;
  padding: 7px 10px; font-size: 13px; font-family: inherit;
}
.filters input { flex: 1; min-width: 140px; }
.filters input:focus, .filters select:focus { outline: none; border-color: #1a73e8; }
.filters select { min-width: 90px; }

/* Shelter list */
.shelter-list { padding: 8px 12px 100px; }
.shelter-card {
  background: #fff; border-radius: 12px; margin: 6px 0; padding: 12px 14px;
  border: 1px solid #e1e5eb; box-shadow: 0 1px 3px rgba(0,0,0,.04);
  cursor: pointer; transition: border-color .15s;
}
.shelter-card:hover { border-color: #1a73e8; }
.shelter-card.expanded { border-color: #1a73e8; }
.card-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.card-code { font-weight: 700; font-size: 14px; color: #1a73e8; }
.card-dist { font-size: 13px; color: #5f6368; }
.card-road { font-size: 13px; color: #5f6368; }
.card-loc { font-size: 13px; color: #80868b; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; align-items: center; }

/* Pills */
.pill {
  display: inline-block; padding: 2px 10px; border-radius: 12px;
  font-size: 11px; font-weight: 600; white-space: nowrap;
}
.p-done { background: #e6f4ea; color: #137333; }
.p-pending { background: #fef7e0; color: #b06000; }
.p-na { background: #f1f3f4; color: #80868b; }
.p-waiting { background: #e8eaed; color: #5f6368; }
.p-partial { background: #e0f2f1; color: #00695c; }
.p-progress { background: #e8f0fe; color: #1a73e8; }
.pill-label { font-size: 10px; color: #9aa0a6; margin-right: -4px; }

/* Detail expand */
.card-detail {
  display: none; margin-top: 10px; padding-top: 10px;
  border-top: 1px solid #f0f0f2; font-size: 13px; cursor: default;
}
.shelter-card.expanded .card-detail { display: block; }
.dt-meta { color: #5f6368; font-size: 12px; margin-bottom: 8px; }

/* P section */
.p-section {
  margin-top: 8px; padding: 10px 12px;
  background: #f8f9fb; border: 1px solid #e8eaed; border-radius: 10px;
}
.p-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.p-name { font-weight: 700; font-size: 13px; color: #202124; }
.p-meta { font-size: 12px; color: #5f6368; margin: 4px 0 0; }
.p-btns { display: flex; gap: 8px; margin-top: 8px; }
.pbtn {
  flex: 1; text-align: center; padding: 9px 6px; border-radius: 8px;
  border: 1px solid #d0d7e0; background: #fff; color: #1a1a1a;
  font-size: 13px; font-weight: 600; text-decoration: none; white-space: nowrap;
  transition: border-color .12s, color .12s;
}
.pbtn:hover { border-color: #1a73e8; color: #1a73e8; }
.pbtn:active { background: #f1f3f4; }
.pbtn.off { opacity: .4; pointer-events: none; }

/* Count */
.count-bar { padding: 6px 16px; font-size: 12px; color: #80868b; }

/* Empty */
.empty { text-align: center; padding: 40px 20px; color: #80868b; font-size: 14px; }

/* Mobile */
@media (max-width: 480px) {
  .summary { grid-template-columns: repeat(2, 1fr); }
  .filters { flex-direction: column; }
  .filters select, .filters input { width: 100%; }
}

/* ===== v2 drill-down redesign ===== */
:root{
  --p1:#ff4757; --p2:#ffcf33; --p3:#1e90ff; --p4:#2ed573;
  --zone-MS:#ff4757; --zone-NS:#2ed573; --zone-SS:#ffcf33; --zone-ES:#1e90ff;
  --ink:#1a1a1a; --muted:#5f6368; --line:#e1e5eb; --bg:#f5f7fa;
}
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:10px;
  background:#fff;border-bottom:1px solid var(--line);padding:10px 14px;}
.back-btn{border:1px solid #d0d7e0;background:#fff;color:var(--ink);border-radius:10px;
  padding:8px 14px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;}
.back-btn:active{background:#f1f3f4;}
.crumb{flex:1;font-size:14px;font-weight:700;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.map-link{text-decoration:none;font-size:13px;font-weight:700;color:#1a73e8;
  border:1px solid #d0d7e0;border-radius:10px;padding:8px 12px;white-space:nowrap;}
.app{padding:14px 14px 120px;max-width:1120px;margin:0 auto;}

.zpills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.zpill{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);
  border-radius:20px;padding:6px 12px;font-size:13px;font-weight:600;color:var(--ink);}
.zpill .zdot{width:10px;height:10px;border-radius:50%;}
.zpill .zn{background:#eef2f6;border-radius:12px;padding:1px 9px;font-size:12px;font-weight:700;}

.page-h{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;flex-wrap:wrap;}
.page-h h2{margin:0;font-size:20px;font-weight:700;color:var(--ink);}
.page-h .ph-sub{font-size:12px;color:var(--muted);margin-top:2px;}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:18px;}
.stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.stat .sn{display:block;font-size:24px;font-weight:800;color:var(--ink);line-height:1.1;}
.stat .sl{font-size:12px;color:var(--muted);margin-top:4px;display:block;}

.team-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.team-col{display:flex;flex-direction:column;gap:10px;}
.big-btn{border:none;border-radius:22px;padding:26px 10px;cursor:pointer;font-family:inherit;
  color:#111;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.12);transition:transform .1s;}
.big-btn:active{transform:scale(.97);}
.big-btn .bn{display:block;font-size:40px;font-weight:800;line-height:1;}
.big-btn .bl{display:block;font-size:15px;font-weight:700;margin-top:8px;}
.big-btn.p1{background:var(--p1);} .big-btn.p2{background:var(--p2);}
.big-btn.p3{background:var(--p3);color:#fff;} .big-btn.p4{background:var(--p4);}

.mini{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;font-size:13px;}
.mini th,.mini td{padding:7px 8px;text-align:center;border-bottom:1px solid #eef1f4;}
.mini th{background:#f7f9fb;color:var(--muted);font-weight:700;font-size:11px;}
.mini td:first-child,.mini th:first-child{text-align:left;font-weight:700;}
.mini tr:last-child td{border-bottom:none;}
.mini .ok{color:#137333;font-weight:700;}
.mini .no{color:#b06000;font-weight:700;}

.zone-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.zone-col{display:flex;flex-direction:column;gap:10px;}
.zone-btn{border:none;border-radius:22px;padding:30px 10px;cursor:pointer;font-family:inherit;color:#111;
  text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.12);transition:transform .1s;}
.zone-btn:active{transform:scale(.97);}
.zone-btn .zk{display:block;font-size:38px;font-weight:800;line-height:1;}
.zone-btn .zl{display:block;font-size:14px;font-weight:700;margin-top:6px;}
.zone-stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;font-size:13px;line-height:1.7;}
.zone-stat .ok{color:#137333;} .zone-stat .no{color:#b06000;}

.search-box{width:100%;border:1px solid #d0d7e0;border-radius:12px;padding:12px 14px;font-size:14px;
  font-family:inherit;margin-bottom:12px;}
.search-box:focus{outline:none;border-color:#1a73e8;}
.row-item{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;
  border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:8px;cursor:pointer;
  box-shadow:0 1px 3px rgba(0,0,0,.04);}
.row-item:active{background:#f7f9fb;}
.row-title{font-weight:700;font-size:15px;color:var(--ink);}
.row-sub{font-size:12px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;}
.row-frac{font-size:14px;font-weight:700;color:var(--muted);white-space:nowrap;}
.row-frac.full{color:#137333;}

.st-done{background:#e6f4ea;color:#137333;border-radius:14px;padding:4px 12px;font-size:12px;font-weight:700;white-space:nowrap;}
.st-todo{background:#fef7e0;color:#b06000;border-radius:14px;padding:4px 12px;font-size:12px;font-weight:700;white-space:nowrap;}

.shelter-item{background:#fff;border:1px solid var(--line);border-radius:12px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.04);overflow:hidden;}
.shelter-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px;cursor:pointer;}
.shelter-item.open .shelter-head{border-bottom:1px solid #eef1f4;}
.sh-panel{display:none;padding:16px;}
.shelter-item.open .sh-panel{display:block;}
.act3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.act{display:flex;flex-direction:column;align-items:center;gap:8px;text-decoration:none;
  border-radius:16px;padding:18px 8px;background:#f5f7fa;border:1px solid var(--line);color:var(--ink);font-weight:700;}
.act .ai{font-size:34px;line-height:1;}
.act .at{font-size:14px;}
.act.a-map{background:#e8f0fe;} .act.a-up{background:#fff8e1;} .act.a-form{background:#e6f4ea;}
.act.off{opacity:.4;pointer-events:none;}
.act .form-status{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;}
.act .form-status.done{background:#e6f4ea;color:#137333;}
.act .form-status.todo{background:#fef7e0;color:#b06000;}

@media(max-width:720px){
  .team-grid,.zone-grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:480px){
  .stats{grid-template-columns:repeat(2,1fr);}
  .big-btn .bn,.zone-btn .zk{font-size:32px;}
  .act{padding:14px 6px;} .act .ai{font-size:28px;}
}

</style>
</head>

  p2: { url: "https://docs.google.com/forms/d/e/1FAIpQLSeaDJtyyu7Ba4ZT7P34P8Qkrtau3ddVr5F1JP2eCplp7NdS1g/viewform", entry: "XXXXXX" },
  p3: { url: "https://docs.google.com/forms/d/e/1FAIpQLSd1i8sw2-ZXvjGO3OeEmHgTA_bTD8YSpd0UlnN1aunqXY2Beg/viewform", entry: "XXXXXX" },
  p4: { url: "https://docs.google.com/forms/d/e/1FAIpQLSeLmkl5WLc57j8nwGW4iV84seIDDA-q-UCCYvknm8kVrpAAEQ/viewform", entry: "XXXXXX" },
};

// ===== LIVE DATA (build-ahead) =====
// Flip CONFIG.LIVE = true once มนต์ sends the 4 published-CSV URLs below.
// Until then the dashboard renders the bundled dummy DATA exactly as before.
const CONFIG = {
  LIVE: true,
  // P_STATUS sheet: one row per shelter — columns code, zone, P1, P2, P3, P4,
  // each = pending / progress / done.
  statusCsv: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQhYBDAEPsCLz_m5rzh2dIug18LysrxzBgHIqyzfGdVGPJ77449cSbgCS1AdAw0uJ4cybFImGIyqlbT/pub?gid=1738862538&single=true&output=csv",
  // Per-form response sheets (optional, raw submissions). Presence of a row = done.
  csv: {
    p1: "",   // P1 Traffy Fix  response sheet CSV — รอมนต์
    p2: "",   // P2 Inspection  response sheet CSV — รอมนต์
    p3: "",   // P3 Maintenance response sheet CSV — รอมนต์
    p4: "",   // P4 Cleaning    response sheet CSV — รอมนต์
  },
  // Phase-specific photo folder CSVs (columns: code, zone, PX_Folder)
  folderCsv: {
    p2: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQhYBDAEPsCLz_m5rzh2dIug18LysrxzBgHIqyzfGdVGPJ77449cSbgCS1AdAw0uJ4cybFImGIyqlbT/pub?gid=1798917762&single=true&output=csv",
    p4: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQhYBDAEPsCLz_m5rzh2dIug18LysrxzBgHIqyzfGdVGPJ77449cSbgCS1AdAw0uJ4cybFImGIyqlbT/pub?gid=53019740&single=true&output=csv",
  },
};

function normCode(c) { return (c || "").replace(/\s+/g, "").toUpperCase(); }

async function fetchCSV(url) {
  try {
    const r = await fetch(url, { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    return parseCSV(await r.text());
  } catch (e) { console.error("CSV fetch failed:", url, e); return []; }
}

function parseCSV(text) {
  const lines = text.replace(/\r/g, "").split("\n").filter(l => l.length);
  if (!lines.length) return [];
  const hdrs = parseLine(lines[0]).map(h => h.trim());
  return lines.slice(1).map(l => {
    const v = parseLine(l);
    return Object.fromEntries(hdrs.map((h, i) => [h, (v[i] || "").trim()]));
  });
}

function parseLine(line) {
  const out = []; let cur = "", inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') inQ = !inQ;
    else if (c === ',' && !inQ) { out.push(cur); cur = ""; }
    else cur += c;
  }
  out.push(cur);
  return out;
}

// Find the shelter-code value in a row. Handles P_STATUS ("code") and the
// form response sheets ("รหัสศาลา / Stop Code"), all carrying values like ES001.
function codeOf(row) {
  for (const k of Object.keys(row)) {
    const h = k.trim().toLowerCase();
    if (k.includes("รหัสศาลา") || h.includes("stop code") || h === "code") return row[k];
  }
  return "";
}

function buildIndex() {
  const idx = {};
  DATA.forEach((s, i) => { idx[normCode(s.code)] = i; });
  return idx;
}

// P_STATUS sheet (PRIMARY): explicit P1..P4 status per shelter.
function mergeStatus(rows) {
  const idx = buildIndex();
  let hits = 0;
  rows.forEach(row => {
    const i = idx[normCode(codeOf(row))];
    if (i === undefined) return;
    ["p1", "p2", "p3", "p4"].forEach((p, n) => {
      const v = (row["P" + (n + 1)] || "").toLowerCase().trim();
      if (v === "pending" || v === "progress" || v === "done") DATA[i][p] = v;
    });
    hits++;
  });
  return hits;
}

// Per-form response sheet (optional, raw): a submission for a code = done.
function mergeResponses(phase, rows) {
  const idx = buildIndex();
  let hits = 0;
  rows.forEach(row => {
    const i = idx[normCode(codeOf(row))];
    if (i === undefined) return;
    DATA[i][phase] = "done";
    hits++;
  });
  return hits;
}

// Phase-specific photo folder CSVs: merge PX_Folder into DATA[i].pX_folder
function mergeFolders(phase, rows) {
  const idx = buildIndex();
  const col = phase.toUpperCase() + "_Folder";   // e.g. "P2_Folder"
  let hits = 0;
  rows.forEach(row => {
    const i = idx[normCode(codeOf(row))];
    if (i === undefined) return;
    const url = (row[col] || "").trim();
    if (url) { DATA[i][phase + "_folder"] = url; hits++; }
  });
  return hits;
}

async function loadLive() {
  const fetches = [];
  // 1. Primary status
  if (CONFIG.statusCsv) {
    fetches.push(fetchCSV(CONFIG.statusCsv).then(rows => mergeStatus(rows)));
  }
  // 2. Optional form response sheets
  const phases = ["p1", "p2", "p3", "p4"].filter(p => CONFIG.csv[p]);
  phases.forEach(p => {
    fetches.push(fetchCSV(CONFIG.csv[p]).then(rows => mergeResponses(p, rows)));
  });
  // 3. Phase-specific folder CSVs
  if (CONFIG.folderCsv) {
    for (const [phase, url] of Object.entries(CONFIG.folderCsv)) {
      if (url) fetches.push(fetchCSV(url).then(rows => mergeFolders(phase, rows)));
    }
  }
  await Promise.all(fetches);
  const badge = document.querySelector(".badge-dummy");   // drop DUMMY badge once live
  if (badge) badge.remove();
}

// ===== UTILS =====
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function statusPill(phase, val, rounds) {
  const lbl = phase.toUpperCase();
  if (val === 'done') return '<span class="pill-label">' + lbl + '</span><span class="pill p-done">✅</span>';
  if (val === 'pending') return '<span class="pill-label">' + lbl + '</span><span class="pill p-pending">⏳</span>';
  if (val === 'progress') return '<span class="pill-label">' + lbl + '</span><span class="pill p-progress">🔧</span>';
  if (val === 'na') return '<span class="pill-label">' + lbl + '</span><span class="pill p-na">—</span>';
  if (val === 'waiting') return '<span class="pill-label">' + lbl + '</span><span class="pill p-waiting">⏸</span>';
  if (val === 'partial') return '<span class="pill-label">' + lbl + '</span><span class="pill p-partial">R' + rounds + '/4</span>';
  return '';
}

function formUrl(phase, code) {
  const f = FORMS[phase];
  if (!f) return '#';
  if (!f.entry || f.entry === 'XXXXXX') return f.url;
  return f.url + '?usp=pp_url&entry.' + f.entry + '=' + encodeURIComponent(code);
}

function mapsUrl(lat, lng) {
  if (!lat || !lng) return '';
  return 'https://www.google.com/maps?q=' + lat + ',' + lng;
}

// ===== DRILL-DOWN NAV (4 levels) =====
const ZONES = [
  { k:'MS', th:'กรุงเทพกลาง',    short:'กลาง' },
  { k:'NS', th:'กรุงเทพเหนือ',   short:'เหนือ' },
  { k:'SS', th:'กรุงเทพใต้',     short:'ใต้' },
  { k:'ES', th:'กรุงเทพตะวันออก', short:'ตะวันออก' },
];
const TEAMS = [
  { k:'p1', n:'P1', th:'ทีมซ่อมด่วน' },
  { k:'p2', n:'P2', th:'ทีมสำรวจ' },
  { k:'p3', n:'P3', th:'ทีมซ่อม' },
  { k:'p4', n:'P4', th:'ทีมทำความสะอาด' },
];
const ZLABEL = {};
ZONES.forEach(z => { ZLABEL[z.k] = z.th; });

let nav = { p:null, zone:null, district:null };
let expandedCode = null;
let searchQ = '';
let _lastView = '';

function jsq(s){ return (s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }

function totalScope(zone, district){
  return DATA.filter(s =>
    (!zone || s.tor === zone) &&
    (!district || s.district === district)).length;
}
function doneP(phase, zone, district){
  return DATA.filter(s =>
    (!zone || s.tor === zone) &&
    (!district || s.district === district) &&
    s[phase] === 'done').length;
}

// ---------- Level 1: overall + pick team ----------
function renderL1(){
  const total = DATA.length;
  const zpills = ZONES.map(z => {
    const n = totalScope(z.k);
    return `<span class="zpill"><span class="zdot" style="background:var(--zone-${z.k})"></span>${z.short}<span class="zn">${n}</span></span>`;
  }).join('');

  const stats = `<div class="stat"><span class="sn">${total}</span><span class="sl">ศาลาทั้งหมด</span></div>` +
    TEAMS.map(t => `<div class="stat"><span class="sn">${doneP(t.k)}/${total}</span><span class="sl">${t.n} ${t.th}</span></div>`).join('');

  const teams = TEAMS.map(t => {
    const rows = ZONES.map(z => {
      const tot = totalScope(z.k);
      const done = doneP(t.k, z.k);
      return `<tr><td>${z.k}</td><td>${tot}</td><td class="ok">${done}</td><td class="no">${tot - done}</td></tr>`;
    }).join('');
    return `<div class="team-col">
      <button class="big-btn ${t.k}" onclick="pickP('${t.k}')">
        <span class="bn">${t.n}</span><span class="bl">${t.th}</span></button>
      <table class="mini"><thead><tr><th></th><th>ทั้งหมด</th><th>เสร็จ</th><th>ยังไม่เสร็จ</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div>`;
  }).join('');

  return `<div class="zpills">${zpills}</div>
    <div class="stats">${stats}</div>
    <div class="team-grid">${teams}</div>`;
}

// ---------- Level 2: pick zone ----------
function renderL2(){
  const t = TEAMS.find(x => x.k === nav.p);
  const cols = ZONES.map(z => {
    const tot = totalScope(z.k), done = doneP(nav.p, z.k);
    return `<div class="zone-col">
      <button class="zone-btn" style="background:var(--zone-${z.k});${z.k === 'ES' ? 'color:#fff' : ''}" onclick="pickZone('${z.k}')">
        <span class="zk">${z.k}</span><span class="zl">${z.short}</span></button>
      <div class="zone-stat">
        <div><b>ทั้งหมด</b> ${tot}</div>
        <div class="ok"><b>เสร็จแล้ว</b> ${done}</div>
        <div class="no"><b>ยังไม่เสร็จ</b> ${tot - done}</div>
      </div></div>`;
  }).join('');
  return `<div class="page-h"><div><h2>เลือกโซน</h2><div class="ph-sub">${t.n} ${t.th}</div></div></div>
    <div class="zone-grid">${cols}</div>`;
}

// ---------- Level 3: districts in zone ----------
function codeRange(zone){
  const codes = DATA.filter(s => s.tor === zone).map(s => s.code);
  if (!codes.length) return '';
  return normCode(codes[0]) + '–' + normCode(codes[codes.length - 1]);
}
function districtListHTML(){
  const seen = new Map();
  DATA.filter(s => s.tor === nav.zone).forEach(s => {
    if (!seen.has(s.district)) seen.set(s.district, { total:0, done:0 });
    const d = seen.get(s.district);
    d.total++; if (s[nav.p] === 'done') d.done++;
  });
  const q = searchQ.trim().toLowerCase();
  let rows = [...seen.entries()];
  if (q){
    rows = rows.filter(([dist]) => {
      if (dist.toLowerCase().includes(q)) return true;
      return DATA.some(s => s.tor === nav.zone && s.district === dist &&
        [s.code, s.road, s.location].join(' ').toLowerCase().includes(q));
    });
  }
  if (!rows.length) return '<div class="empty">ไม่พบเขตที่ตรงเงื่อนไข</div>';
  return rows.map(([dist, d]) => {
    const full = d.done === d.total && d.total > 0 ? 'full' : '';
    return `<div class="row-item" onclick="pickDistrict('${jsq(dist)}')">
      <div class="row-title">${esc(dist)}</div>
      <div class="row-frac ${full}">${d.done}/${d.total}</div></div>`;
  }).join('');
}
function renderL3(){
  const t = TEAMS.find(x => x.k === nav.p);
  const z = ZONES.find(x => x.k === nav.zone);
  const tot = totalScope(nav.zone), done = doneP(nav.p, nav.zone);
  const pct = tot ? Math.round(done / tot * 100) : 0;
  return `<div class="page-h">
      <div><h2>${z.th}</h2><div class="ph-sub">${codeRange(nav.zone)} · ${t.n} ${t.th}</div></div>
    </div>
    <div class="stats">
      <div class="stat"><span class="sn">${tot}</span><span class="sl">ทั้งหมด</span></div>
      <div class="stat"><span class="sn" style="color:#137333">${done}</span><span class="sl">เสร็จแล้ว</span></div>
      <div class="stat"><span class="sn" style="color:#b06000">${tot - done}</span><span class="sl">เหลือ</span></div>
      <div class="stat"><span class="sn">${pct}%</span><span class="sl">Done</span></div>
    </div>
    <input id="searchBox" class="search-box" type="search" placeholder="🔍 ค้น code, ถนน, location..." value="${esc(searchQ)}">
    <div id="distList">${districtListHTML()}</div>`;
}

// ---------- Level 4: shelters in district ----------
function renderL4(){
  const z = ZONES.find(x => x.k === nav.zone);
  const t = TEAMS.find(x => x.k === nav.p);
  const shelters = DATA.filter(s => s.tor === nav.zone && s.district === nav.district);
  const items = shelters.map(s => {
    const done = s[nav.p] === 'done';
    const open = s.code === expandedCode;
    const folder = s[nav.p + '_folder'] || s.folder;
    const maps = mapsUrl(s.lat, s.long);
    const form = formUrl(nav.p, s.code);
    const stTxt = done ? 'เสร็จ ✓' : 'ยังไม่ทำ';
    const panel = `<div class="sh-panel">
      <div class="act3">
        <a class="act a-map ${maps ? '' : 'off'}" href="${maps || '#'}" target="_blank" rel="noopener"><span class="ai">📍</span><span class="at">แผนที่</span></a>
        <a class="act a-up ${folder ? '' : 'off'}" href="${folder ? esc(folder) : '#'}" target="_blank" rel="noopener"><span class="ai">📁</span><span class="at">อัพรูป</span></a>
        <a class="act a-form" href="${form}" target="_blank" rel="noopener"><span class="ai">📄</span><span class="at">กรอกข้อมูล</span><span class="form-status ${done ? 'done' : 'todo'}">${stTxt}</span></a>
      </div></div>`;
    return `<div class="shelter-item ${open ? 'open' : ''}">
      <div class="shelter-head" onclick="toggleShelter('${jsq(s.code)}')">
        <div><div class="row-title">${esc(s.code)}</div><div class="row-sub">${esc(s.district)} · ${esc(s.location || '')}</div></div>
        <span class="${done ? 'st-done' : 'st-todo'}">${stTxt}</span>
      </div>${panel}</div>`;
  }).join('') || '<div class="empty">ไม่มีศาลาในเขตนี้</div>';
  return `<div class="page-h"><div><h2>${esc(nav.district)}</h2>
      <div class="ph-sub">${z.th} · ${t.n} · ${shelters.length} ศาลา</div></div></div>
    ${items}`;
}

// ---------- navigation ----------
function pickP(p){ nav.p = p; nav.zone = null; nav.district = null; searchQ = ''; render(); }
function pickZone(z){ nav.zone = z; nav.district = null; searchQ = ''; render(); }
function pickDistrict(d){ nav.district = d; expandedCode = null; render(); }
function toggleShelter(code){ expandedCode = (expandedCode === code) ? null : code; render(); }
function goBack(){
  if (nav.district !== null){ nav.district = null; expandedCode = null; }
  else if (nav.zone !== null){ nav.zone = null; }
  else if (nav.p !== null){ nav.p = null; }
  searchQ = '';
  render();
}

function updateTopbar(){
  const back = document.getElementById('backBtn');
  const crumb = document.getElementById('crumb');
  if (!nav.p){
    crumb.textContent = 'The Surveyor v2 — Dashboard รวม 4 ทีม';
    back.style.display = 'none';
    return;
  }
  const parts = [];
  const t = TEAMS.find(x => x.k === nav.p);
  parts.push(t.n + ' ' + t.th);
  if (nav.zone) parts.push(ZLABEL[nav.zone]);
  if (nav.district) parts.push(nav.district);
  crumb.textContent = parts.join('  ›  ');
  back.style.display = '';
}

function attachSearch(){
  const box = document.getElementById('searchBox');
  if (!box) return;
  box.addEventListener('input', () => {
    searchQ = box.value;
    const list = document.getElementById('distList');
    if (list) list.innerHTML = districtListHTML();
  });
}

function render(){
  updateTopbar();
  const app = document.getElementById('app');
  let view;
  if (!nav.p){ app.innerHTML = renderL1(); view = 'L1'; }
  else if (!nav.zone){ app.innerHTML = renderL2(); view = 'L2:' + nav.p; }
  else if (!nav.district){ app.innerHTML = renderL3(); attachSearch(); view = 'L3:' + nav.p + nav.zone; }
  else { app.innerHTML = renderL4(); view = 'L4:' + nav.p + nav.zone + nav.district; }
  if (view !== _lastView) window.scrollTo(0, 0);
  _lastView = view;
}

// ===== INIT =====
// TNS (กรุงธน 272 หลัง) is out of scope — not in มนต์'s verified list, no forms,
// no P_STATUS rows. Drop it so list + all counters run on the 1,348 in-scope shelters.
for (let i = DATA.length - 1; i >= 0; i--) {
  if (DATA[i].tor === 'TNS') DATA.splice(i, 1);
}

async function init() {
  if (CONFIG.LIVE) {
    try { await loadLive(); } catch (e) { console.error("live load failed — using bundled data", e); }
  }
  render();
}
init();
</script>
</body>
